name: Build & Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Fix line endings
        run: sed -i 's/\r$//' gradlew gradlew.bat && chmod +x gradlew

      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore release.jks \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -alias release \
            -storepass android \
            -keypass android \
            -dname "CN=AList, OU=Dev, O=AList, L=Shanghai, ST=SH, C=CN"

      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_FILE: release.jks
          KEYSTORE_PASSWORD: android
          KEY_ALIAS: release
          KEY_PASSWORD: android

      - name: Get version
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AList-Android-v${{ steps.version.outputs.version }}
          path: app/build/outputs/apk/release/*.apk

      - name: Create Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: AList Android v${{ steps.version.outputs.version }}
          body: |
            ## AList Android v${{ steps.version.outputs.version }}
            - Kotlin + WebView wrapper for AList
            - Material3 dark theme
            - ARM64 native build
          files: app/build/outputs/apk/release/*.apk
